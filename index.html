<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility</title>

    <script data-goatcounter="https://hazev.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --success: #28a745;
            --danger: #dc3545;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header bilanciato */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .header-side {
            flex: 1;
            display: flex;
        }

        .header-side.right {
            justify-content: flex-end;
        }

        h2 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 30px; 
            font-weight: bold; 
            text-align: center;
            flex: 2;
            user-select: none; 
            -webkit-user-select: none;
            cursor: pointer; 
        }

        /* TASTO INSTALLA VERDE */
        #install-btn {
            display: none;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
            50% { transform: scale(1.05); box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4); }
            100% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        }

        /* Griglia Bottoni */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            font-weight: 500;
        }

        .menu-btn:active { 
            transform: translateY(2px); 
            opacity: 0.9; 
        }

        /* Tasto Speciale Oggi */
        .btn-oggi {
            background-color: var(--success);
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        /* Feedback e Telegram */
        .feedback-section {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 350px;
        }

        .feedback-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .telegram-icon {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .telegram-icon:active { transform: scale(0.9); }

        /* --- STILI MODALE PROMEMORIA DDS --- */
        #ddsReminderModal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
            justify-content: center; align-items: center; 
            z-index: 5000; padding: 20px; box-sizing: border-box; 
            backdrop-filter: blur(3px); 
        }
        .dds-reminder-content { 
            background: white; padding: 25px; border-radius: 15px; 
            width: 100%; max-width: 350px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 6px solid #ffc107; 
        }
        .dds-reminder-item { 
            background: #f8f9fa; padding: 15px; border-radius: 10px; 
            margin-bottom: 10px; text-align: left; border-left: 4px solid #0056b3; 
        }

        /* --- STILI TASTI NASCOSTI --- */
        #secret-btn {
            display: none;
            background-color: var(--danger); /* Riportato al rosso */
        }

        #rotazioni-btn {
            display: none; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-side"></div>
        
        <h2 id="main-title">Utility</h2>
        
        <div class="header-side right">
            <button id="install-btn">Installa</button>
        </div>
    </div>

    <div class="menu-grid">
        <a href="calendario.html?oggi=true" class="menu-btn btn-oggi">Turno di Oggi</a>
        
        <a href="calendario.html" class="menu-btn">📅 Calendario</a>
        <a href="dati_calendario.html" class="menu-btn">📊 Statistiche Calendario</a>
        
        <a href="turni.html" class="menu-btn">🔄 Turni</a>
        <a href="orari.html" class="menu-btn">🕒 Orari</a>
        
        <a href="rotazioni.html" id="rotazioni-btn" class="menu-btn">👥 Rotazioni</a>

        <a href="documenti.html" class="menu-btn">📄 Documenti</a>
        
        <a href="link.html" class="menu-btn">🔗 Link</a>
        <a href="contatti.html" class="menu-btn">📞 Contatti</a>
        <a href="buoni.html" class="menu-btn">🍝 Buoni Pasto</a>
        
        <a href="dds.html" class="menu-btn">📂 Archivio DDS</a>
        
        <a href="guida.html" class="menu-btn" style="background-color: #6c757d;">📖 Guida</a>
        
        <a href="admin.html" id="secret-btn" class="menu-btn">🔒 Admin</a>
    </div>

    <div class="feedback-section">
        <p>Se vuoi contattarmi per feedback o altro clicca l'icona qui sotto</p>
        <a href="http://t.me/MattiaB1058" target="_blank" class="telegram-icon">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="#0088cc">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.45c.538-.196 1.006.128.832.941z"/>
            </svg>
        </a>
    </div>

    <div id="ddsReminderModal">
        <div class="dds-reminder-content">
            <h3 style="margin-top: 0; color: #333;">🔔 Promemoria DDS</h3>
            <div id="ddsReminderList" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button onclick="document.getElementById('ddsReminderModal').style.display='none'" style="background: #0056b3; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer;">Ho capito, chiudi</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
        }

        // ==========================================
        // GESTIONE INSTALLAZIONE PWA
        // ==========================================
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // ==========================================
        // GESTIONE PROMEMORIA DDS LOCALI (Prima apertura del giorno)
        // ==========================================
        function checkLocalDDSReminders() {
            const today = new Date().toISOString().split('T')[0];
            const lastReminderDate = localStorage.getItem('last_dds_reminder_date');

            // Esci se il promemoria è già stato mostrato oggi
            if (lastReminderDate === today) return;

            const request = indexedDB.open("ddsDatabase");

            request.onsuccess = function(event) {
                const db = event.target.result;
                if (!db.objectStoreNames.contains("disposizioni")) return;

                const tx = db.transaction("disposizioni", "readonly");
                const store = tx.objectStore("disposizioni");
                const requestGetAll = store.getAll();

                requestGetAll.onsuccess = function() {
                    const allDDS = requestGetAll.result;
                    // Filtra le DDS di oggi che hanno l'avviso attivato
                    const todayReminders = allDDS.filter(item => item.data === today && item.avviso === true);

                    if (todayReminders.length > 0) {
                        const list = document.getElementById('ddsReminderList');
                        list.innerHTML = '';
                        todayReminders.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'dds-reminder-item';
                            div.innerHTML = `<strong>${item.titolo}</strong><br><small>${item.descrizione || ''}</small>`;
                            list.appendChild(div);
                        });
                        document.getElementById('ddsReminderModal').style.display = 'flex';
                        // Salva la data dell'ultimo promemoria mostrato
                        localStorage.setItem('last_dds_reminder_date', today);
                    }
                };
            };
        }

        // ==========================================
        // GESTIONE TASTI NASCOSTI (Admin e Rotazioni)
        // ==========================================
        const titleTrigger = document.getElementById('main-title');
        const secretBtn = document.getElementById('secret-btn');
        const rotazioniBtn = document.getElementById('rotazioni-btn');
        
        let tapCount = 0;
        let tapTimer;
        let holdTimer;
        
        const ADMIN_TAPS = 5;
        const ROTAZIONI_TAPS = 3;
        const HOLD_DURATION = 3000;

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('dev_mode_active') === 'true') {
                secretBtn.style.display = 'block';
            }
            if (localStorage.getItem('rotazioni_visibili') === 'true') {
                rotazioniBtn.style.display = 'block';
            }
            
            // Avvia il controllo dei promemoria locali
            checkLocalDDSReminders();
            // Avvia il controllo degli aggiornamenti remoti
            checkDDSUpdates();
        });

        function resetSequence() {
            tapCount = 0;
            clearTimeout(tapTimer);
            clearTimeout(holdTimer);
        }

        function handleStart(e) {
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            clearTimeout(tapTimer); 
            clearTimeout(holdTimer);
            tapCount++;

            if (tapCount === ROTAZIONI_TAPS || tapCount === ADMIN_TAPS) {
                holdTimer = setTimeout(() => {
                    if (tapCount === ADMIN_TAPS) {
                        secretBtn.style.display = 'block';
                        localStorage.setItem('dev_mode_active', 'true');
                        alert("🛠️ Area Amministratore Sbloccata");
                    } else if (tapCount === ROTAZIONI_TAPS) {
                        rotazioniBtn.style.display = 'block';
                        localStorage.setItem('rotazioni_visibili', 'true');
                        rotazioniBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        alert("👥 Tasto Rotazioni Sbloccato");
                    }
                    resetSequence();
                }, HOLD_DURATION);
            } else if (tapCount > ADMIN_TAPS) {
                resetSequence();
            } else {
                tapTimer = setTimeout(resetSequence, 500);
            }
        }

        function handleEnd() {
            clearTimeout(holdTimer);
        }

        titleTrigger.addEventListener('touchstart', handleStart, { passive: false });
        titleTrigger.addEventListener('touchend', handleEnd);
        titleTrigger.addEventListener('touchcancel', handleEnd);
        titleTrigger.addEventListener('mousedown', handleStart);
        titleTrigger.addEventListener('mouseup', handleEnd);
        titleTrigger.addEventListener('mouseleave', handleEnd);

        // Controllo Badge DDS "Nuovo"
        async function checkDDSUpdates() {
            try {
                const res = await fetch('last_dds.json?v=' + new Date().getTime());
                if (!res.ok) return;
                const data = await res.json();
                const lastSeen = localStorage.getItem('last_dds_seen');
                const lastUpdateDate = data.last_update;

                if (lastUpdateDate !== lastSeen) {
                    const ddsBtn = document.querySelector('a[href="dds.html"]');
                    if (ddsBtn) {
                        ddsBtn.innerHTML = "📂 Archivio DDS <span style='color:#f1c40f; font-size:14px;'>● Nuovo</span>";
                        ddsBtn.style.border = "2px solid #f1c40f";
                    }
                }
            } catch (e) { console.log("Check DDS fallito"); }
        }
    </script>
</body>
</html>
