<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility</title>

    <script data-goatcounter="https://hazev.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --success: #28a745;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header bilanciato */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .header-side {
            flex: 1;
            display: flex;
        }

        .header-side.right {
            justify-content: flex-end;
        }

        h2 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 30px; 
            font-weight: bold; 
            text-align: center;
            flex: 2;
        }

        /* TASTO INSTALLA VERDE */
        #install-btn {
            display: none;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
            50% { transform: scale(1.05); box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4); }
            100% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        }

        /* Griglia Bottoni */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            font-weight: 500;
        }

        .menu-btn:active { 
            transform: translateY(2px); 
            opacity: 0.9; 
        }

        /* Tasto Speciale Oggi */
        .btn-oggi {
            background-color: var(--success);
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        /* Feedback e Telegram */
        .feedback-section {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 350px;
        }

        .feedback-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .telegram-icon {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .telegram-icon:active { transform: scale(0.9); }

        /* --- STILI MODALE PROMEMORIA DDS --- */
        #ddsReminderModal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
            justify-content: center; align-items: center; 
            z-index: 5000; padding: 20px; box-sizing: border-box; 
            backdrop-filter: blur(3px); 
        }
        .dds-reminder-content { 
            background: white; padding: 25px; border-radius: 15px; 
            width: 100%; max-width: 350px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 6px solid #ffc107; 
        }
        .dds-reminder-item { 
            background: #f8f9fa; padding: 15px; border-radius: 10px; 
            margin-bottom: 10px; text-align: left; border-left: 4px solid #0056b3; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-side"></div>
        
        <h2>Utility</h2>
        
        <div class="header-side right">
            <button id="install-btn">Installa</button>
        </div>
    </div>

    <div class="menu-grid">
        <a href="calendario.html?oggi=true" class="menu-btn btn-oggi">Turno di Oggi</a>
        
        <a href="calendario.html" class="menu-btn">📅 Calendario</a>
        <a href="dati_calendario.html" class="menu-btn">📊 Statistiche Calendario</a>
        
        <a href="turni.html" class="menu-btn">🔄 Turni</a>
        <a href="orari.html" class="menu-btn">🕒 Orari</a>
        <a href="documenti.html" class="menu-btn">📄 Documenti</a>
        
        <a href="link.html" class="menu-btn">🔗 Link</a>
        <a href="contatti.html" class="menu-btn">📞 Contatti</a>
        <a href="buoni.html" class="menu-btn">🍝 Buoni Pasto</a>
        
        <a href="dds.html" class="menu-btn">📂 Archivio DDS</a>
        
        <a href="guida.html" class="menu-btn" style="background-color: #6c757d;">📖 Guida</a>
    </div>

    <div class="feedback-section">
        <p>Se vuoi contattarmi per feedback o altro clicca l'icona qui sotto</p>
        <a href="http://t.me/MattiaB1058" target="_blank" class="telegram-icon">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="#0088cc">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.45c.538-.196 1.006.128.832.941z"/>
            </svg>
        </a>
    </div>

    <div id="ddsReminderModal">
        <div class="dds-reminder-content">
            <h3 style="margin-top: 0; color: #333;">🔔 Promemoria DDS</h3>
            <p style="font-size: 14px; color: #555;">Attenzione, ci sono delle modifiche al servizio in arrivo o in corso:</p>
            <div id="ddsReminderList" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button onclick="document.getElementById('ddsReminderModal').style.display='none'" style="background: #0056b3; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer;">Ho capito, chiudi</button>
            <button onclick="window.location.href='dds.html'" style="background: white; color: #0056b3; border: 2px solid #0056b3; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer;">Vai all'Archivio DDS</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
        }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });

        // ==========================================
        // CONTROLLO PROMEMORIA DDS ALL'AVVIO
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const oggiStr = new Date().toISOString().split('T')[0];
            const ultimoAvviso = localStorage.getItem('dds_ultimo_avviso');

            if (ultimoAvviso === oggiStr) {
                return; // Evita di riaprire il pop-up lo stesso giorno
            }

            try {
                const request = indexedDB.open("UtilityDB");
                
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("archivio_dds")) return;

                    const tx = db.transaction("archivio_dds", "readonly");
                    const store = tx.objectStore("archivio_dds");
                    const getReq = store.getAll();

                    getReq.onsuccess = function() {
                        const ddsList = getReq.result;
                        
                        // Generazione delle date corrette a mezzanotte esatta (evita errori di fuso orario)
                        const oggi = new Date(); oggi.setHours(0,0,0,0);
                        const oggiTime = oggi.getTime();
                        const domaniTime = oggiTime + 86400000;
                        
                        let avvisiDaMostrare = [];

                        ddsList.forEach(dds => {
                            if (!dds.reminder) return;
                            let remArray = Array.isArray(dds.reminder) ? dds.reminder : [dds.reminder];
                            if (remArray.length === 0 || remArray.includes('none')) return;
                            
                            // Costruisce la lista di tutte le date in cui la DDS è attiva
                            let validDates = [];

                            if (dds.dateValidita) {
                                // Nuovo sistema con calendario multiplo (Array di giorni separati)
                                validDates = dds.dateValidita.map(dStr => {
                                    const p = dStr.split('-');
                                    return new Date(p[0], p[1]-1, p[2]); // Creazione pulita alla mezzanotte locale
                                });
                            } else {
                                // Vecchio sistema (Da - A, oppure singolo giorno)
                                const dDa = dds.dataDa || dds.dataEntrata;
                                const dA = dds.dataA || dds.dataEntrata;
                                if (dDa && dA) {
                                    let pDa = dDa.split('-'); let curr = new Date(pDa[0], pDa[1]-1, pDa[2]);
                                    let pA = dA.split('-'); let end = new Date(pA[0], pA[1]-1, pA[2]);
                                    while(curr <= end) {
                                        validDates.push(new Date(curr));
                                        curr.setDate(curr.getDate() + 1);
                                    }
                                }
                            }

                            if (validDates.length === 0) return;
                            validDates.sort((a,b) => a.getTime() - b.getTime());

                            // Verifica la corrispondenza con oggi e domani
                            const isFirstDay = validDates[0].getTime() === oggiTime;
                            const isFirstDayTomorrow = validDates[0].getTime() === domaniTime;
                            const hasToday = validDates.some(d => d.getTime() === oggiTime);
                            const hasTomorrow = validDates.some(d => d.getTime() === domaniTime);
                            
                            let mostra = false;
                            let messaggioGiorno = "";

                            // Controllo 1: Il Giorno Prima
                            if (remArray.includes('day_before') && hasTomorrow) { 
                                mostra = true; 
                                messaggioGiorno = isFirstDayTomorrow ? "Inizia domani" : "In vigore domani"; 
                            }
                            
                            // Controllo 2: Primo giorno di validità
                            if (remArray.includes('first_day') && isFirstDay) { 
                                mostra = true; 
                                messaggioGiorno = "Inizia oggi"; 
                            }
                            
                            // Controllo 3: Tutti i giorni di validità
                            if (remArray.includes('all_days') && hasToday) { 
                                mostra = true; 
                                messaggioGiorno = isFirstDay ? "Inizia oggi" : "In vigore oggi"; 
                            }

                            if (mostra) {
                                avvisiDaMostrare.push({ titolo: dds.titolo, giorno: messaggioGiorno });
                            }
                        });

                        if (avvisiDaMostrare.length > 0) {
                            const listContainer = document.getElementById('ddsReminderList');
                            listContainer.innerHTML = '';
                            avvisiDaMostrare.forEach(avviso => {
                                listContainer.innerHTML += `
                                    <div class="dds-reminder-item">
                                        <span style="font-size: 12px; font-weight: bold; color: #dc3545; text-transform: uppercase;">Avviso: ${avviso.giorno}</span><br>
                                        <span style="font-weight: bold; font-size: 15px;">${avviso.titolo}</span>
                                    </div>
                                `;
                            });
                            document.getElementById('ddsReminderModal').style.display = 'flex';
                            
                            localStorage.setItem('dds_ultimo_avviso', oggiStr);
                        }
                    };
                };
            } catch(e) {
                console.error("IndexedDB bloccato.");
            }
        });
    </script>
</body>
</html>
