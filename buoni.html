<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore Buoni Pasto</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --danger: #dc3545;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Il vecchio stile back-btn lo lasciamo intatto nel caso servisse altrove, 
           ma aggiungiamo lo stile per il nuovo tasto hamburger */
        .hamburger-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: var(--primary);
            cursor: pointer;
            padding: 0;
            width: 50px;
            text-align: left;
        }

        h2 {
            margin: 0;
            color: var(--primary);
        }

        .counter-container {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .counter-label {
            font-size: 18px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-value {
            font-size: 100px;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
            line-height: 1;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .calc-btn {
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            font-size: 40px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calc-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        .calc-btn.minus {
            background-color: var(--danger);
        }

        .calc-btn.plus {
            background-color: var(--primary);
        }

        .avanzato-btn {
            background-color: #e9ecef;
            color: var(--text-color);
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            font-weight: bold;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .esegui-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .risultato-box {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            min-height: 24px;
        }

        .close-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* --- NUOVI STILI ESCLUSIVI PER IL MENU LATERALE --- */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
        }

        .sidebar {
            position: fixed;
            top: 0; left: -280px; /* Nascosto fuori dallo schermo */
            width: 250px; height: 100%;
            background-color: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            z-index: 2001;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0; /* Scivola dentro lo schermo */
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--primary);
            color: white;
        }

        .sidebar-header h3 {
            margin: 0;
            color: white;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .sidebar-link {
            padding: 15px 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 18px;
            border-bottom: 1px solid #eee;
            display: block;
        }

        .sidebar-link:active, .sidebar-link:hover {
            background-color: #f4f7f6;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="hamburger-btn" onclick="apriMenuLaterale()">☰</button>
        <h2>Buoni Pasto</h2>
        <div style="width: 50px;"></div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="chiudiMenuLaterale()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button class="close-sidebar" onclick="chiudiMenuLaterale()">✕</button>
        </div>
        <a href="index.html" class="sidebar-link">🏠 Home Page</a>
        <a href="calendario.html" class="sidebar-link">📅 Calendario</a>
        <a href="turni.html" class="sidebar-link">🔄 Turni</a>
        <a href="orari.html" class="sidebar-link">🕒 Orari</a>
        <a href="link.html" class="sidebar-link">🔗 Link</a>
        <a href="numeri.html" class="sidebar-link">📞 Numeri</a>
        <a href="dati_calendario.html" class="sidebar-link">📊 Dati Calendario</a>
        <a href="buoni.html" class="sidebar-link">🍔 Buoni Pasto</a>

    </div>

    <div class="counter-container">
        <div class="counter-label">Buoni Disponibili</div>
        <div id="buoni-count" class="counter-value">0</div>
        
        <div class="btn-group">
            <button class="calc-btn minus" onclick="modificaBuoni(-1)">-</button>
            <button class="calc-btn plus" onclick="modificaBuoni(1)">+</button>
        </div>

        <button class="avanzato-btn" onclick="apriCalcolatore()">Calcolatore buoni</button>
    </div>

    <div id="modal-calcolatore" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: var(--primary);">Calcolo buoni</h2>
            
            <div class="input-group">
                <label>Presenze mese corrente</label>
                <input type="number" id="pres-corrente" value="0">
            </div>
            
            <div class="input-group">
                <label>Presenze mese passato</label>
                <input type="number" id="pres-passato" value="0">
            </div>
            
            <div class="input-group">
                <label>Buoni in tessera</label>
                <input type="number" id="buoni-tessera" value="0">
            </div>

            <button class="esegui-btn" onclick="eseguiCalcolo()">Calcola</button>
            
            <div id="risultato-calcolo" class="risultato-box"></div>
            
            <button class="close-btn" onclick="chiudiCalcolatore()">Chiudi</button>
        </div>
    </div>

    <script>
        // --- LOGICA MENU LATERALE ---
        function apriMenuLaterale() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').style.display = 'block';
        }

        function chiudiMenuLaterale() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        // --- LOGICA CONTATORE BASE E CALCOLATORE (Invariata) ---
        let buoniAttuali = localStorage.getItem('buoni_salvati') ? parseInt(localStorage.getItem('buoni_salvati')) : 0;
        document.getElementById('buoni-count').innerText = buoniAttuali;

        function modificaBuoni(valore) {
            buoniAttuali += valore;
            if (buoniAttuali < 0) {
                buoniAttuali = 0;
            }
            document.getElementById('buoni-count').innerText = buoniAttuali;
            localStorage.setItem('buoni_salvati', buoniAttuali);
        }

        function apriCalcolatore() {
            document.getElementById('modal-calcolatore').style.display = 'flex';
            document.getElementById('risultato-calcolo').innerText = ''; 
        }

        function chiudiCalcolatore() {
            document.getElementById('modal-calcolatore').style.display = 'none';
        }

        function eseguiCalcolo() {
            const presCorrente = parseInt(document.getElementById('pres-corrente').value) || 0;
            const presPassato = parseInt(document.getElementById('pres-passato').value) || 0;
            const buoniTessera = parseInt(document.getElementById('buoni-tessera').value) || 0;
            
            const risultato = presCorrente + presPassato + buoniTessera - 62;
            document.getElementById('risultato-calcolo').innerText = "Risultato: " + risultato;
        }

        window.onclick = function(event) {
            const modalCalcolatore = document.getElementById('modal-calcolatore');
            // Gestisce la chiusura cliccando fuori (mantiene invariata la logica per la modale)
            if (event.target === modalCalcolatore) {
                chiudiCalcolatore();
            }
        }
    </script>

</body>
</html>
