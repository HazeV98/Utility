<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Aziendale</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- STILI HEADER --- */
        .header {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        h2 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 28px;
        }

        /* --- STILI GRIGLIA PULSANTI HOME --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .menu-btn:active {
            background-color: #004494;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Menu Principale</h2>
    </div>

    <div class="menu-grid">
        <a href="calendario.html" class="menu-btn">Calendario</a>
        <a href="turni.html" class="menu-btn">Turni</a>
        <a href="orari.html" class="menu-btn">Orari</a>
        <a href="link.html" class="menu-btn">Link</a>
        <a href="numeri.html" class="menu-btn">Numeri</a>
        <a href="dati_calendario.html" class="menu-btn">Dati Calendario</a>
        <a href="buoni.html" class="menu-btn">Buoni Pasto</a>
    </div>

</body>
</html>
