<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility</title>

    <script data-goatcounter="https://hazev.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --success: #28a745;
            --danger: #dc3545;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header bilanciato */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        h1 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 32px; 
            font-weight: bold; 
            text-align: center;
            user-select: none; /* Evita la selezione del testo durante i tocchi */
            cursor: pointer;
        }

        .btn-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .btn { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: opacity 0.2s, transform 0.2s; 
            display: block; 
        }
        
        .btn:active { 
            transform: translateY(2px); 
            opacity: 0.9; 
        }

        .btn-admin { background-color: #343a40; }
        .btn-generatore { background-color: var(--danger); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="title-trigger">Utility</h1>
    </div>

    <div class="btn-container">
        <a href="calendario.html" class="btn">📅 Calendario</a>
        <a href="dati_calendario.html" class="btn">📊 Statistiche Calendario</a>
        <a href="turni.html" class="btn">🔄 Turni</a>
        <a href="orari.html" class="btn">🕒 Orari</a>
        <a href="documenti.html" class="btn">📄 Documenti</a>
        
        <a href="rotazioni.html" class="btn" id="btn-rotazioni" style="display: none;">👥 Rotazioni</a>
        
        <a href="link.html" class="btn">🔗 Link</a>
        <a href="contatti.html" class="btn">📞 Contatti</a>
        <a href="buoni.html" class="btn">🍝 Buoni Pasto</a>
        <a href="dds.html" class="btn">📂 Archivio DDS</a>
        <a href="guida.html" class="btn">📖 Guida</a>
        
        <a href="generatore.html" class="btn btn-generatore" id="btn-generatore" style="display: none;">🔑 Generatore Codici</a>
        <a href="admin.html" class="btn btn-admin" id="btn-admin" style="display: none;">🛠️ Area Amministratore</a>
    </div>

    <script>
        // ==========================================
        // 1. GESTIONE VISIBILITÀ TASTI AL CARICAMENTO
        // ==========================================
        
        // Controllo per il tasto Rotazioni (Solo per F. Nove)
        try {
            const appDataStr = localStorage.getItem('myTurniApp');
            // Cerca la parola "nove" nelle impostazioni salvate dal calendario
            if (appDataStr && appDataStr.toLowerCase().includes('nove')) {
                document.getElementById('btn-rotazioni').style.display = 'block';
            }
        } catch(e) {
            console.error("Errore lettura dati calendario per rotazioni:", e);
        }

        // Controllo per il tasto Generatore Codici
        if (localStorage.getItem('generatore_sbloccato') === 'true') {
            document.getElementById('btn-generatore').style.display = 'block';
        }

        // Controllo per il tasto Admin
        if (localStorage.getItem('dev_mode_active') === 'true') {
            document.getElementById('btn-admin').style.display = 'block';
        }

        // ==========================================
        // 2. LOGICA DEI TOCCHI E PRESSIONE SUL TITOLO
        // ==========================================
        const titleTrigger = document.getElementById('title-trigger');
        
        const ADMIN_TAPS = 5;
        const GENERATORE_TAPS = 3;
        const HOLD_DURATION = 3000; 

        let tapCount = 0;
        let tapTimer;
        let holdTimer;

        function resetSequence() {
            tapCount = 0;
            clearTimeout(tapTimer);
            clearTimeout(holdTimer);
        }

        function handleStart(e) {
            if (e.type === 'touchstart' && e.cancelable) e.preventDefault();
            
            tapCount++;
            clearTimeout(tapTimer);
            clearTimeout(holdTimer);

            if (tapCount === ADMIN_TAPS || tapCount === GENERATORE_TAPS) {
                holdTimer = setTimeout(() => {
                    // --- SBLOCCO ADMIN (5 Tocchi + Pressione) ---
                    if (tapCount === ADMIN_TAPS) {
                        const adminBtn = document.getElementById('btn-admin');
                        adminBtn.style.display = 'block';
                        localStorage.setItem('dev_mode_active', 'true');
                        adminBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        alert("🛠️ Area Amministratore Sbloccata");
                    } 
                    // --- SBLOCCO GENERATORE CODICI (3 Tocchi + Pressione) ---
                    else if (tapCount === GENERATORE_TAPS) {
                        const generatoreBtn = document.getElementById('btn-generatore');
                        generatoreBtn.style.display = 'block';
                        localStorage.setItem('generatore_sbloccato', 'true');
                        generatoreBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        alert("🔑 Generatore Codici Sbloccato");
                    }
                    resetSequence();
                }, HOLD_DURATION);
            } else if (tapCount > ADMIN_TAPS) {
                resetSequence();
            } else {
                tapTimer = setTimeout(resetSequence, 500);
            }
        }

        function handleEnd() {
            clearTimeout(holdTimer);
        }

        // Supporto Touch (Smartphone)
        titleTrigger.addEventListener('touchstart', handleStart, { passive: false });
        titleTrigger.addEventListener('touchend', handleEnd);
        titleTrigger.addEventListener('touchcancel', handleEnd);

        // Supporto Mouse (PC)
        titleTrigger.addEventListener('mousedown', handleStart);
        titleTrigger.addEventListener('mouseup', handleEnd);
        titleTrigger.addEventListener('mouseleave', handleEnd);
        
    </script>
</body>
</html>
