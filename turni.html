<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Utility - Turni</title>

    <script data-goatcounter="https://hazev.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.0/dist/panzoom.min.js"></script>

    <style>
        /* --- STILI GLOBALI UNIFICATI --- */
        :root { --primary: #0056b3; --bg-color: #f4f7f6; --text-color: #333; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* HEADER */
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .hamburger-btn { background: none; border: none; font-size: 30px; color: var(--primary); cursor: pointer; padding: 0; width: 50px; text-align: left; }
        h2 { margin: 0; color: var(--primary); font-size: 24px; }
        
        /* MENU LATERALE */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 2000; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 250px; height: 100%; background-color: white; box-shadow: 2px 0 5px rgba(0,0,0,0.2); z-index: 2001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: var(--primary); color: white; }
        .sidebar-link { padding: 15px 20px; text-decoration: none; color: var(--text-color); font-size: 18px; border-bottom: 1px solid #eee; display: block; }
        .sidebar-link:active, .sidebar-link:hover { background-color: #f4f7f6; color: var(--primary); font-weight: bold; }

        /* CONTENUTI SPECIFICI E BOTTONI */
        .content-area { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .status-message { text-align: center; color: #666; font-size: 16px; padding: 20px; background: white; border-radius: 10px; }
        .folder-btn { background-color: white; color: var(--primary); border: 2px solid var(--primary); padding: 18px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; text-align: center; }
        .file-row { display: flex; gap: 8px; width: 100%; }
        .file-btn { flex-grow: 1; background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; text-decoration: none; display: block; text-align: center; font-weight: bold; }
        .download-btn { width: 55px; background-color: white; color: var(--primary); border: 2px solid var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .file-btn:active, .download-btn:active, .folder-btn:active { transform: translateY(2px); }
        .back-btn { background-color: #6c757d; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .back-btn:active { transform: translateY(2px); }

        /* BARRA DI RICERCA IMMAGINI */
        .search-container { position: relative; width: 100%; margin-bottom: 5px; }
        #shiftSearch { width: 100%; padding: 15px; border: 2px solid var(--primary); border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit; }
        #shiftSearch:focus { box-shadow: 0 0 5px rgba(0, 86, 179, 0.3); }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 250px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: none; margin-top: 5px; }
        .suggestion-item { padding: 14px 15px; border-bottom: 1px solid #eee; cursor: pointer; color: var(--text-color); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item:active { background-color: #f4f7f6; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <button class="hamburger-btn" onclick="apriMenuLaterale()">☰</button>
        <h2>Turni</h2>
        <div style="width: 50px;"></div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="chiudiMenuLaterale()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0; color:white;">Menu</h3>
            <button style="background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="chiudiMenuLaterale()">✕</button>
        </div>
        <a href="index.html" class="sidebar-link">🏠 Home Page</a>
        <a href="calendario.html" class="sidebar-link">📅 Calendario</a>
        <a href="dati_calendario.html" class="sidebar-link">📊 Statistiche Calendario</a>
        <a href="turni.html" class="sidebar-link">🔄 Turni</a>
        <a href="orari.html" class="sidebar-link">🕒 Orari</a>
        <a href="documenti.html" class="sidebar-link">📄 Documenti</a>
        <a href="link.html" class="sidebar-link">🔗 Link</a>
        <a href="contatti.html" class="sidebar-link">📞 Contatti</a>
        <a href="buoni.html" class="sidebar-link">🍔 Buoni Pasto</a>
    </div>

    <div id="content-area" class="content-area">
        <div class="status-message">Caricamento cartelle...</div>
    </div>

    <div id="imageModal" style="display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); overflow: hidden;" onclick="chiudiSeSfondo(event)">
        <div style="position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; font-size: 35px; color: white; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10001;" onclick="chiudiImageModal()">&times;</div>
        <div id="imageFlexContainer" style="display:flex; flex-direction: column; justify-content:center; align-items:center; height:100%; padding:20px; padding-bottom: 80px; position: relative;">
            <img id="turnoImage" src="" style="max-width: 100%; max-height: 70vh; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain;">
            <div id="imageBanner" style="position: relative; z-index: 10001; margin-top: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 13px; text-align: center; max-width: 90%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                ⚠️ Controllare sempre la presenza di eventuali varianti ai turni.
            </div>
        </div>
        <button onclick="scaricaImmagineTurno()" style="position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #11cdef; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 10001;">📥 Scarica</button>
    </div>

    <script>
        // --- FUNZIONI MENU LATERALE ---
        function apriMenuLaterale() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').style.display = 'block'; }
        function chiudiMenuLaterale() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').style.display = 'none'; }

        // --- LOGICA SPECIFICA TURNI ---
        const GITHUB_USER = "HazeV98"; 
        const GITHUB_REPO = "Utility";
        let numCartelle = 0;
        
        let currentImgList = [];
        let currentImgDir = "";
        
        // --- VARIABILI VISUALIZZATORE IMMAGINE ---
        let pzInstance = null;
        let currentImagePath = "";

        async function downloadForzato(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }

        async function init() {
            // Inizializza Panzoom per il visualizzatore immagini
            const imgElem = document.getElementById('turnoImage');
            if (typeof Panzoom !== 'undefined') {
                pzInstance = Panzoom(imgElem, { maxScale: 5, minScale: 1 });
                document.getElementById('imageFlexContainer').addEventListener('wheel', pzInstance.zoomWithWheel);
                
                function eseguiZoomToggle(e) {
                    if (!pzInstance) return;
                    let currentScale = pzInstance.getScale();
                    if (currentScale < 1.1) {
                        pzInstance.zoom(1.75, { animate: true });
                    } else {
                        pzInstance.reset({ animate: true });
                    }
                }

                let lastTap = 0;
                let isPinching = false;

                imgElem.addEventListener('touchstart', function(e) { if (e.touches.length > 1) { isPinching = true; } });

                imgElem.addEventListener('touchend', function(e) {
                    if (isPinching) {
                        if (e.touches.length === 0) { setTimeout(() => isPinching = false, 300); }
                        return;
                    }
                    let currentTime = new Date().getTime();
                    let tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        eseguiZoomToggle(e);
                        if (e.cancelable) e.preventDefault();
                    }
                    lastTap = currentTime;
                });

                imgElem.addEventListener('dblclick', function(e) { eseguiZoomToggle(e); });
            }

            // Inizializza le cartelle Github
            const area = document.getElementById('content-area');
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const files = await res.json();
                const dirs = files.filter(f => f.type === "dir" && (f.name.startsWith("turni_pdf_") || f.name.startsWith("turni_varianti_")));
                numCartelle = dirs.length;
                
                if (numCartelle === 1) { 
                    caricaFiles(dirs[0].name); 
                } else {
                    area.innerHTML = ""; 
                    dirs.sort((a,b) => b.name.localeCompare(a.name));
                    
                    dirs.forEach(d => {
                        const btn = document.createElement('button'); 
                        btn.className = "folder-btn";
                        btn.onclick = () => caricaFiles(d.name); 
                        area.appendChild(btn);
                        
                        if (d.name.includes("varianti")) {
                            btn.innerText = "Caricamento...";
                            fetch(`https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${d.name}/nome.txt?v=${new Date().getTime()}`)
                                .then(response => {
                                    if (response.ok) return response.text();
                                    throw new Error("File txt assente");
                                })
                                .then(testo => {
                                    btn.innerText = testo.trim() || d.name.replace("turni_varianti_", "").replace(/_/g, " ");
                                })
                                .catch(() => {
                                    btn.innerText = d.name.replace("turni_varianti_", "").replace(/_/g, " ");
                                });
                        } else {
                            let label = d.name.replace("turni_pdf_", "").split("-").reverse().join("-");
                            btn.innerText = "Turni dal " + label;
                        }
                    });
                }
            } catch (e) { area.innerHTML = "<div class='status-message'>Errore di connessione.</div>"; }
        }

        async function caricaFiles(dir) {
            const area = document.getElementById('content-area'); 
            area.innerHTML = "<div class='status-message'>Caricamento dati...</div>";
            
            let imgDir = "";
            if (dir.startsWith("turni_pdf_")) {
                imgDir = dir.replace("turni_pdf_", "turni_");
            } else if (dir.startsWith("turni_varianti_")) {
                imgDir = dir.replace("turni_varianti_", "turni_jpg_varianti_");
            }
            
            currentImgDir = imgDir;
            currentImgList = [];
            
            try {
                const imgRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${imgDir}`);
                if (imgRes.ok) {
                    const imgFiles = await imgRes.json();
                    currentImgList = imgFiles.filter(f => f.name.toLowerCase().endsWith(".jpg") || f.name.toLowerCase().endsWith(".png"));
                }
            } catch(e) { console.log("Cartella immagini per ricerca non trovata", e); }
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${dir}`);
                const files = await res.json();
                
                let pdfs = files.filter(f => f.name.toLowerCase().endsWith(".pdf"));
                
                pdfs.sort((a, b) => {
                    if (a.name.includes("libro_turni_completo")) return -1;
                    if (b.name.includes("libro_turni_completo")) return 1;
                    return a.name.localeCompare(b.name, undefined, {numeric: true});
                });
                
                area.innerHTML = "";
                
                if (numCartelle > 1) { 
                    const b = document.createElement('button'); 
                    b.className = "back-btn"; 
                    b.innerText = "← Indietro"; 
                    b.onclick = init; 
                    area.appendChild(b); 
                }
                
                // BARRA DI RICERCA
                if (currentImgList.length > 0) {
                    const searchDiv = document.createElement('div');
                    searchDiv.className = "search-container";
                    searchDiv.innerHTML = `
                        <input type="text" id="shiftSearch" placeholder="Cerca turno" autocomplete="off" oninput="filtraTurni()" onfocus="filtraTurni()">
                        <div id="suggestionsBox" class="suggestions-box"></div>
                    `;
                    area.appendChild(searchDiv);
                }
                
                // Generazione Lista PDF
                pdfs.forEach(f => {
                    let nomeOrig = f.name;
                    let nomeVis = "";
                    if (nomeOrig.includes("libro_turni_completo")) {
                        nomeVis = "Libro turni completo";
                    } else {
                        let n = nomeOrig.replace(/\.pdf$/i, "").replace(/_/g, " ");
                        n = n.split(/\s+dal\s+/i)[0]; 
                        n = n.replace(/\s+pdf$/i, "").trim(); 
                        n = n.replace(/\blinea\b/gi, "linea");
                        nomeVis = n.charAt(0).toUpperCase() + n.slice(1);
                    }

                    const row = document.createElement('div'); row.className = "file-row";
                    if (nomeOrig.includes("libro")) row.style.marginBottom = "10px";

                    const aOpen = document.createElement('a');
                    aOpen.className = "file-btn"; aOpen.innerText = nomeVis;
                    aOpen.href = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${dir}/${nomeOrig}`;
                    aOpen.target = "_blank";

                    const aDown = document.createElement('div');
                    aDown.className = "download-btn"; aDown.innerHTML = "⬇️";
                    aDown.onclick = () => downloadForzato(f.download_url, nomeOrig);

                    row.appendChild(aOpen); row.appendChild(aDown);
                    area.appendChild(row);
                });
            } catch (e) { area.innerHTML = "<div class='status-message'>Errore caricamento PDF.</div>"; }
        }

        // --- FUNZIONE PER LA RICERCA DINAMICA ---
        function filtraTurni() {
            const input = document.getElementById('shiftSearch');
            const box = document.getElementById('suggestionsBox');
            if (!input || !box) return;

            input.value = input.value.toUpperCase(); 
            const query = input.value.trim();
            
            if (query.length === 0) {
                box.style.display = 'none';
                return;
            }

            const matches = currentImgList.filter(f => {
                const nomeSenzaExt = f.name.replace(/\.[^/.]+$/, "").toUpperCase();
                return nomeSenzaExt.includes(query);
            });

            if (matches.length > 0) {
                box.innerHTML = '';
                matches.forEach(m => {
                    const nomeSenzaExt = m.name.replace(/\.[^/.]+$/, "").toUpperCase();
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerHTML = `<span>Turno ${nomeSenzaExt}</span> <span>🖼️</span>`;
                    item.onclick = () => {
                        // APRE IL VISUALIZZATORE IN-APP
                        currentImagePath = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${currentImgDir}/${m.name}`;
                        let imgElement = document.getElementById('turnoImage');
                        imgElement.onerror = erroreImmagine; 
                        imgElement.src = currentImagePath;
                        if (pzInstance) { pzInstance.reset(); }
                        document.getElementById('imageModal').style.display = 'block';
                        
                        box.style.display = 'none';
                        input.value = ''; 
                    };
                    box.appendChild(item);
                });
                box.style.display = 'block';
            } else {
                box.innerHTML = '<div style="padding: 14px 15px; color: #888;">Nessun turno trovato con questo nome.</div>';
                box.style.display = 'block';
            }
        }

        // --- FUNZIONI MODALE IMMAGINE ---
        function chiudiSeSfondo(event) { 
            if (event.target.id === 'imageModal' || event.target.id === 'imageFlexContainer') chiudiImageModal(); 
        }
        
        function chiudiImageModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.getElementById('turnoImage').removeAttribute('src');
            if (pzInstance) { pzInstance.reset(); }
        }

        function erroreImmagine() {
            document.getElementById('turnoImage').onerror = null; 
            alert("L'immagine del turno non è stata trovata.");
            chiudiImageModal();
        }

        function scaricaImmagineTurno() {
            if (!currentImagePath) return;
            const a = document.createElement('a');
            a.href = currentImagePath;
            a.download = currentImagePath.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Chiude la tendina dei suggerimenti se l'utente clicca fuori
        document.addEventListener('click', function(e) {
            const box = document.getElementById('suggestionsBox');
            const input = document.getElementById('shiftSearch');
            if (box && e.target !== input && !box.contains(e.target)) {
                box.style.display = 'none';
            }
        });

        window.onload = init;
    </script>
</body>
</html>
