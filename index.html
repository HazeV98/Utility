<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility</title>

    <script data-goatcounter="https://hazev.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --success: #28a745;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header bilanciato */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .header-side {
            flex: 1;
            display: flex;
        }

        .header-side.right {
            justify-content: flex-end;
        }

        h2 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 30px; 
            font-weight: bold; 
            text-align: center;
            flex: 2;
        }

        /* TASTO INSTALLA VERDE */
        #install-btn {
            display: none;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
            50% { transform: scale(1.05); box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4); }
            100% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        }

        /* Griglia Bottoni */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            font-weight: 500;
        }

        .menu-btn:active { 
            transform: translateY(2px); 
            opacity: 0.9; 
        }

        /* Tasto Speciale Oggi */
        .btn-oggi {
            background-color: var(--success);
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        /* Feedback e Telegram */
        .feedback-section {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 350px;
        }

        .feedback-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .telegram-icon {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .telegram-icon:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-side"></div>
        
        <h2>Utility</h2>
        
        <div class="header-side right">
            <button id="install-btn">Installa</button>
        </div>
    </div>

    <div class="menu-grid">
        <a href="calendario.html?oggi=true" class="menu-btn btn-oggi">Turno di Oggi</a>
        
        <a href="calendario.html" class="menu-btn">📅 Calendario</a>
        <a href="dati_calendario.html" class="menu-btn">📊 Statistiche Calendario</a>
        
        <a href="turni.html" class="menu-btn">🔄 Turni</a>
        <a href="orari.html" class="menu-btn">🕒 Orari</a>
        <a href="documenti.html" class="menu-btn">📄 Documenti</a>
        
        <a href="link.html" class="menu-btn">🔗 Link</a>
        <a href="contatti.html" class="menu-btn">📞 Contatti</a>
        <a href="buoni.html" class="menu-btn">🍔 Buoni Pasto</a>
        
        <a href="guida.html" class="menu-btn" style="background-color: #6c757d;">📖 Guida</a>
    </div>

    <div class="feedback-section">
        <p>Se vuoi contattarmi per feedback o altro clicca l'icona qui sotto</p>
        <a href="http://t.me/MattiaB1058" target="_blank" class="telegram-icon">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="#0088cc">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.45c.538-.196 1.006.128.832.941z"/>
            </svg>
        </a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
        }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });
    </script>
</body>
</html>
